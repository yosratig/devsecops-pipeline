apiVersion: apps/v1
kind: Deployment
metadata:
  name: webgoat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webgoat
  template:
    metadata:
      labels:
        app: webgoat
    spec:
      containers:
      - name: webgoat
        image: yosratig/webgoat:latest
        args:
        - "--spring.config.location=classpath:/,file:/home/webgoat/config/"
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: props
          mountPath: /home/webgoat/config
      volumes:
      - name: props
        configMap:
          name: webgoat-props
          items:
          - key: application.properties
            path: application.properties
